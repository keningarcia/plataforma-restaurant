<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Historial de Pedidos</a>
            <div class="d-flex align-items-center gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small">Fecha inicio</label>
                        <input type="date" id="filterFrom" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Fecha fin</label>
                        <input type="date" id="filterTo" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Mesa</label>
                        <select id="filterTable" class="form-select form-select-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Mesero</label>
                        <select id="filterWaiter" class="form-select form-select-sm">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button id="applyFilterBtn" class="btn btn-primary btn-sm">Filtrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="historyContainer">
            <p class="text-muted text-center">Cargando historial...</p>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = { history: 'restaurant_history', orders: 'restaurant_orders' };

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.history)) || []; } catch { return []; }
        }

        function getActiveOrders() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.orders)) || []; } catch { return []; }
        }

        function populateFilters() {
            const history = getHistory();
            const tables = [...new Set(history.map(o => o.table))].sort((a, b) => a - b);
            const waiters = [...new Set(history.map(o => o.waiter).filter(Boolean))].sort();

            const tableSelect = document.getElementById('filterTable');
            tableSelect.innerHTML = '<option value="">Todas</option>' + tables.map(t => `<option value="${t}">Mesa ${t}</option>`).join('');

            const waiterSelect = document.getElementById('filterWaiter');
            waiterSelect.innerHTML = '<option value="">Todos</option>' + waiters.map(w => `<option value="${w}">${w}</option>`).join('');
        }

        function renderHistory() {
            const history = getHistory();
            const from = document.getElementById('filterFrom').value;
            const to = document.getElementById('filterTo').value;
            const tableFilter = document.getElementById('filterTable').value;
            const waiterFilter = document.getElementById('filterWaiter').value;

            let filtered = [...history];

            if (from) filtered = filtered.filter(o => o.createdAt && o.createdAt.slice(0, 10) >= from);
            if (to) filtered = filtered.filter(o => o.createdAt && o.createdAt.slice(0, 10) <= to);
            if (tableFilter) filtered = filtered.filter(o => o.table === parseInt(tableFilter));
            if (waiterFilter) filtered = filtered.filter(o => o.waiter === waiterFilter);

            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            const container = document.getElementById('historyContainer');

            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-muted text-center">No se encontraron pedidos en el historial.</p>';
                return;
            }

            container.innerHTML = filtered.map(o => {
                const total = o.items.reduce((s, i) => s + i.price * i.qty, 0);
                const date = o.createdAt ? new Date(o.createdAt).toLocaleString('es-PE') : '—';
                return `
                    <div class="card shadow-sm mb-2">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <div>
                                <strong>Mesa ${o.table}</strong>
                                <span class="badge bg-secondary ms-2">${date}</span>
                            </div>
                            <div>
                                <span class="text-muted small me-2">${o.waiter || '—'}</span>
                                <strong>S/ ${total.toFixed(2)}</strong>
                            </div>
                        </div>
                        <div class="card-body py-2">
                            <div class="table-responsive">
                                <table class="table table-sm mb-0">
                                    <thead>
                                        <tr>
                                            <th>Producto</th>
                                            <th class="text-center">Cant.</th>
                                            <th class="text-end">Precio</th>
                                            <th class="text-end">Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${o.items.map(i => `
                                            <tr>
                                                <td>${i.name}</td>
                                                <td class="text-center">${i.qty}</td>
                                                <td class="text-end">S/ ${i.price.toFixed(2)}</td>
                                                <td class="text-end">S/ ${(i.price * i.qty).toFixed(2)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('applyFilterBtn').addEventListener('click', renderHistory);

        populateFilters();
        renderHistory();
    </script>
</body>
</html>
