<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Cuenta</a>
            <div class="d-flex align-items-center gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Cobrar Cuenta</h4>
                    <div>
                        <label for="tableSelect" class="form-label small mb-0 me-2">Mesa:</label>
                        <select id="tableSelect" class="form-select form-select-sm d-inline-block w-auto">
                            <option value="">Seleccionar mesa</option>
                        </select>
                    </div>
                </div>

                <div id="billContainer">
                    <div class="text-center text-muted py-5">
                        <h5>Seleccione una mesa con pedidos listos o servidos</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Pago</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="paymentMessage" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="confirmPaymentBtn">Confirmar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const STORAGE_KEYS = { orders: 'restaurant_orders', history: 'restaurant_history' };
        const IGV_RATE = 0.18;

        function getOrders() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.orders)) || []; } catch { return []; }
        }

        function saveOrders(orders) {
            localStorage.setItem(STORAGE_KEYS.orders, JSON.stringify(orders));
        }

        function getHistory() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.history)) || []; } catch { return []; }
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(history));
        }

        function populateTables() {
            const orders = getOrders();
            const tablesWithOrders = [...new Set(orders.filter(o => o.status === 'ready' || o.status === 'served').map(o => o.table))];
            const select = document.getElementById('tableSelect');
            select.innerHTML = '<option value="">Seleccionar mesa</option>' +
                tablesWithOrders.map(t => `<option value="${t}">Mesa ${t}</option>`).join('');
            if (tablesWithOrders.length === 0) {
                select.innerHTML = '<option value="">No hay mesas pendientes de cobro</option>';
            }
        }

        function renderBill(table) {
            const container = document.getElementById('billContainer');
            if (!table) {
                container.innerHTML = '<div class="text-center text-muted py-5"><h5>Seleccione una mesa con pedidos listos o servidos</h5></div>';
                return;
            }

            const orders = getOrders().filter(o => o.table === parseInt(table) && (o.status === 'ready' || o.status === 'served'));
            if (orders.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5"><h5>No hay pedidos para esta mesa</h5></div>';
                return;
            }

            const allItems = [];
            orders.forEach(o => o.items.forEach(i => {
                const existing = allItems.find(x => x.id === i.id);
                if (existing) existing.qty += i.qty;
                else allItems.push({ ...i });
            }));

            const subtotal = allItems.reduce((s, i) => s + i.price * i.qty, 0);
            const igv = subtotal * IGV_RATE;
            const total = subtotal + igv;

            container.innerHTML = `
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between">
                        <h5 class="mb-0">Cuenta - Mesa ${table}</h5>
                        <small class="text-muted">${orders.length} pedido(s)</small>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Producto</th>
                                        <th class="text-center">Cant.</th>
                                        <th class="text-end">P. Unit.</th>
                                        <th class="text-end">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${allItems.map(i => `
                                        <tr>
                                            <td>${i.name}</td>
                                            <td class="text-center">${i.qty}</td>
                                            <td class="text-end">S/ ${i.price.toFixed(2)}</td>
                                            <td class="text-end">S/ ${(i.price * i.qty).toFixed(2)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                                <tfoot class="table-light">
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">Subtotal</td>
                                        <td class="text-end">S/ ${subtotal.toFixed(2)}</td>
                                    </tr>
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">IGV (18%)</td>
                                        <td class="text-end">S/ ${igv.toFixed(2)}</td>
                                    </tr>
                                    <tr class="fw-bold">
                                        <td colspan="3" class="text-end">TOTAL</td>
                                        <td class="text-end fs-5">S/ ${total.toFixed(2)}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-between">
                        <button class="btn btn-outline-danger btn-sm" id="splitBillBtn">Dividir Cuenta</button>
                        <button class="btn btn-success" id="payBillBtn">Cobrar S/ ${total.toFixed(2)}</button>
                    </div>
                </div>
            `;

            document.getElementById('payBillBtn').addEventListener('click', function () {
                document.getElementById('paymentMessage').textContent =
                    `Confirmar cobro de S/ ${total.toFixed(2)} para la Mesa ${table}.`;
                const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
                modal.show();
                document.getElementById('confirmPaymentBtn').onclick = function () {
                    const allOrders = getOrders();
                    const servedOrders = allOrders.filter(o => o.table === parseInt(table) && (o.status === 'ready' || o.status === 'served'));
                    const history = getHistory();
                    servedOrders.forEach(o => {
                        o.status = 'billed';
                        o.billedAt = new Date().toISOString();
                        history.push(o);
                    });
                    saveHistory(history);
                    saveOrders(allOrders.filter(o => !(o.table === parseInt(table) && (o.status === 'ready' || o.status === 'served'))));
                    modal.hide();
                    populateTables();
                    renderBill();
                };
            });

            document.getElementById('splitBillBtn').addEventListener('click', function () {
                const diners = prompt('¿Entre cuántas personas se divide la cuenta?', '2');
                const n = parseInt(diners);
                if (isNaN(n) || n < 2) return;
                const perPerson = total / n;
                alert(`Cuenta dividida en ${n} personas.\nCada uno paga: S/ ${perPerson.toFixed(2)}`);
            });
        }

        document.getElementById('tableSelect').addEventListener('change', function () {
            renderBill(this.value);
        });

        populateTables();
    </script>
</body>
</html>
