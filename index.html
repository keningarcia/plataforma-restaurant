<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Gestión - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Iniciar Sesión</h3>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="********" required>
                            </div>
                            <div id="alertContainer"></div>
                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                        </form>
                        <p class="text-center text-muted small mt-3 mb-0">
                            Demo: admin@restaurant.com / 123456
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const alertContainer = document.getElementById('alertContainer');
            const btn = this.querySelector('button[type="submit"]');

            alertContainer.innerHTML = '';
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            try {
                const data = await api.auth.login(email, password);
                api.setToken(data.token);
                api.setUser(data.user);
                alertContainer.innerHTML = '<div class="alert alert-success">Inicio de sesión exitoso. Redirigiendo...</div>';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
