<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Gestión de Usuarios</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-light small"><strong id="waiterName"></strong></span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
                <button onclick="api.logout()" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0" id="formTitle">Nuevo Usuario</h5>
                    </div>
                    <div class="card-body">
                        <form id="userForm">
                            <input type="hidden" id="editId">
                            <div class="mb-3">
                                <label for="userName" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="userName" required>
                            </div>
                            <div class="mb-3">
                                <label for="userEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="userEmail" required>
                            </div>
                            <div class="mb-3" id="passwordGroup">
                                <label for="userPassword" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="userPassword" minlength="4">
                            </div>
                            <div class="mb-3">
                                <label for="userRole" class="form-label">Rol</label>
                                <select class="form-select" id="userRole">
                                    <option value="waiter">Mesero</option>
                                    <option value="kitchen">Cocina</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="saveBtn">Guardar Usuario</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" id="cancelEditBtn" style="display:none">Cancelar Edición</button>
                            </div>
                        </form>
                        <hr>
                        <div id="passwordChangeSection" style="display:none">
                            <h6>Cambiar Contraseña</h6>
                            <div class="mb-2">
                                <input type="password" class="form-control form-control-sm mb-2" id="changeCurrentPwd" placeholder="Contraseña actual">
                                <input type="password" class="form-control form-control-sm mb-2" id="changeNewPwd" placeholder="Nueva contraseña">
                                <button class="btn btn-sm btn-warning w-100" id="changePwdBtn">Cambiar Contraseña</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div id="usersContainer"><div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div><p class="text-muted mt-2">Cargando usuarios...</p></div></div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        if (!api.checkAuth()) return;
        const user = api.getUser();
        if (user) document.getElementById('waiterName').textContent = user.name;

        let usersCache = [];

        async function loadUsers() {
            usersCache = await api.users.getAll();
            renderUsers();
        }

        function renderUsers() {
            const container = document.getElementById('usersContainer');
            container.innerHTML = usersCache.length === 0
                ? '<p class="text-muted">No hay usuarios registrados.</p>'
                : `<div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Creado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${usersCache.map(u => `
                                <tr>
                                    <td>${u.name}</td>
                                    <td>${u.email}</td>
                                    <td><span class="badge ${u.role === 'admin' ? 'bg-danger' : u.role === 'kitchen' ? 'bg-warning text-dark' : 'bg-info'}">${u.role === 'admin' ? 'Admin' : u.role === 'kitchen' ? 'Cocina' : 'Mesero'}</span></td>
                                    <td><small class="text-muted">${u.created_at ? new Date(u.created_at).toLocaleDateString('es-PE') : '—'}</small></td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-primary edit-user" data-id="${u.id}">Editar</button>
                                        <button class="btn btn-sm btn-outline-danger delete-user" data-id="${u.id}" ${u.id === user.id ? 'disabled' : ''}>Eliminar</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        document.getElementById('userForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            try {
                if (editId) {
                    await api.users.update(editId, { name, email, role });
                    document.getElementById('formTitle').textContent = 'Nuevo Usuario';
                    document.getElementById('saveBtn').textContent = 'Guardar Usuario';
                    document.getElementById('cancelEditBtn').style.display = 'none';
                    document.getElementById('passwordChangeSection').style.display = 'none';
                    document.getElementById('passwordGroup').querySelector('label').textContent = 'Contraseña';
                    document.getElementById('userPassword').required = false;
                    document.getElementById('editId').value = '';
                } else {
                    if (!password) { alert('La contraseña es requerida para nuevos usuarios'); return; }
                    await api.users.create({ name, email, password, role });
                }
                this.reset();
                await loadUsers();
            } catch (err) {
                alert(err.message);
            }
        });

        document.getElementById('cancelEditBtn').addEventListener('click', function () {
            document.getElementById('formTitle').textContent = 'Nuevo Usuario';
            document.getElementById('saveBtn').textContent = 'Guardar Usuario';
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('passwordChangeSection').style.display = 'none';
            document.getElementById('passwordGroup').querySelector('label').textContent = 'Contraseña';
            document.getElementById('userPassword').required = false;
            document.getElementById('userForm').reset();
            document.getElementById('editId').value = '';
        });

        document.getElementById('usersContainer').addEventListener('click', async function (e) {
            const editBtn = e.target.closest('.edit-user');
            if (editBtn) {
                const id = parseInt(editBtn.dataset.id);
                const u = usersCache.find(x => x.id === id);
                if (u) {
                    document.getElementById('editId').value = u.id;
                    document.getElementById('userName').value = u.name;
                    document.getElementById('userEmail').value = u.email;
                    document.getElementById('userRole').value = u.role;
                    document.getElementById('formTitle').textContent = 'Editar Usuario';
                    document.getElementById('saveBtn').textContent = 'Actualizar Usuario';
                    document.getElementById('cancelEditBtn').style.display = 'block';
                    document.getElementById('passwordGroup').querySelector('label').textContent = 'Contraseña (dejar vacío para mantener)';
                    document.getElementById('userPassword').required = false;
                    if (u.id === user.id) {
                        document.getElementById('passwordChangeSection').style.display = 'block';
                    }
                }
                return;
            }

            const deleteBtn = e.target.closest('.delete-user');
            if (deleteBtn) {
                const id = parseInt(deleteBtn.dataset.id);
                if (confirm('¿Eliminar este usuario?')) {
                    try {
                        await api.users.delete(id);
                        await loadUsers();
                    } catch (err) {
                        alert(err.message);
                    }
                }
            }
        });

        document.getElementById('changePwdBtn').addEventListener('click', async function () {
            const editId = document.getElementById('editId').value;
            const currentPwd = document.getElementById('changeCurrentPwd').value;
            const newPwd = document.getElementById('changeNewPwd').value;
            if (!currentPwd || !newPwd) { alert('Completa ambos campos'); return; }
            try {
                await api.users.changePassword(editId, currentPwd, newPwd);
                alert('Contraseña actualizada correctamente');
                document.getElementById('changeCurrentPwd').value = '';
                document.getElementById('changeNewPwd').value = '';
            } catch (err) {
                alert(err.message);
            }
        });

        loadUsers().catch(() => {
            document.getElementById('usersContainer').innerHTML = '<div class="alert alert-danger">Error al cargar usuarios</div>';
        });
    </script>
</body>
</html>
