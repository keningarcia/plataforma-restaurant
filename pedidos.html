<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Gestión - Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Plataforma Restaurant</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-light small">Mesero: <strong id="waiterName">Carlos López</strong></span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Menú</h4>
                    <div>
                        <label for="tableSelect" class="form-label small mb-0 me-2">Mesa:</label>
                        <select id="tableSelect" class="form-select form-select-sm d-inline-block w-auto"></select>
                    </div>
                </div>

                <ul class="nav nav-tabs" id="menuTabs">
                    <li class="nav-item">
                        <button class="nav-link active" data-category="entradas">Entradas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="principales">Platos Principales</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="bebidas">Bebidas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="postres">Postres</button>
                    </li>
                </ul>

                <div id="menuItems" class="row mt-3"></div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Pedido Actual</h5>
                    </div>
                    <div class="card-body p-3">
                        <div id="orderItems">
                            <p class="text-muted text-center small mb-0">No hay items en el pedido.</p>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <div class="d-flex justify-content-between mb-2">
                            <strong>Total:</strong>
                            <strong id="orderTotal">S/ 0.00</strong>
                        </div>
                        <div class="d-grid gap-2">
                            <button id="sendOrderBtn" class="btn btn-success" disabled>Enviar a Cocina</button>
                            <button id="clearOrderBtn" class="btn btn-outline-danger btn-sm">Cancelar Pedido</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Pedido Enviado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script>
        if (!api.getToken()) { window.location.href = 'index.html'; }

        const user = api.getUser();
        if (user) document.getElementById('waiterName').textContent = user.name;

        let currentOrder = [];
        let currentCategory = 'entradas';
        let menuItems = [];
        let tablesCache = [];

        const menuItemsEl = document.getElementById('menuItems');
        const orderItemsEl = document.getElementById('orderItems');
        const orderTotalEl = document.getElementById('orderTotal');
        const sendOrderBtn = document.getElementById('sendOrderBtn');
        const clearOrderBtn = document.getElementById('clearOrderBtn');

        async function loadData() {
            const [menu, tables] = await Promise.all([
                api.menu.getAll(),
                api.tables.getAll()
            ]);
            menuItems = menu.filter(i => i.available);
            tablesCache = tables;
            loadTables();
            renderMenu(currentCategory);
        }

        function loadTables() {
            const select = document.getElementById('tableSelect');
            select.innerHTML = tablesCache.map(t => `<option value="${t.number}">Mesa ${t.number}</option>`).join('');
        }

        function renderMenu(category) {
            const items = menuItems.filter(i => i.category === category);
            menuItemsEl.innerHTML = items.length === 0
                ? '<p class="text-muted">No hay platos disponibles en esta categoría.</p>'
                : items.map(item => `
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">${item.name}</h6>
                                    <small class="text-muted">S/ ${item.price.toFixed(2)}</small>
                                </div>
                                <button class="btn btn-sm btn-outline-primary add-item" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        function getOrderSummary() {
            const summary = {};
            currentOrder.forEach(item => {
                if (!summary[item.id]) {
                    summary[item.id] = { id: item.id, name: item.name, price: item.price, qty: 0 };
                }
                summary[item.id].qty++;
            });
            return Object.values(summary);
        }

        function renderOrder() {
            if (currentOrder.length === 0) {
                orderItemsEl.innerHTML = '<p class="text-muted text-center small mb-0">No hay items en el pedido.</p>';
                orderTotalEl.textContent = 'S/ 0.00';
                sendOrderBtn.disabled = true;
                return;
            }

            const summary = getOrderSummary();
            let total = 0;
            orderItemsEl.innerHTML = summary.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                return `
                    <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                        <div>
                            <small class="d-block fw-bold">${item.name}</small>
                            <small class="text-muted">${item.qty} x S/ ${item.price.toFixed(2)}</small>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="fw-bold">S/ ${subtotal.toFixed(2)}</span>
                            <button class="btn btn-sm btn-outline-danger remove-item" data-id="${item.id}">&times;</button>
                        </div>
                    </div>
                `;
            }).join('');

            orderTotalEl.textContent = `S/ ${total.toFixed(2)}`;
            sendOrderBtn.disabled = false;
        }

        document.querySelectorAll('#menuTabs .nav-link').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('#menuTabs .nav-link').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMenu(currentCategory);
            });
        });

        menuItemsEl.addEventListener('click', function (e) {
            const btn = e.target.closest('.add-item');
            if (!btn) return;
            const id = parseInt(btn.dataset.id);
            const name = btn.dataset.name;
            const price = parseFloat(btn.dataset.price);
            currentOrder.push({ id, name, price });
            renderOrder();
        });

        orderItemsEl.addEventListener('click', function (e) {
            const btn = e.target.closest('.remove-item');
            if (!btn) return;
            const id = parseInt(btn.dataset.id);
            const idx = currentOrder.findLastIndex(item => item.id === id);
            if (idx !== -1) {
                currentOrder.splice(idx, 1);
                renderOrder();
            }
        });

        clearOrderBtn.addEventListener('click', function () {
            if (currentOrder.length === 0) return;
            if (confirm('¿Estás seguro de cancelar el pedido actual?')) {
                currentOrder = [];
                renderOrder();
            }
        });

        sendOrderBtn.addEventListener('click', async function () {
            const table_number = parseInt(document.getElementById('tableSelect').value);
            const summary = getOrderSummary();
            const total = summary.reduce((sum, item) => sum + item.price * item.qty, 0);

            try {
                const order = await api.orders.create({
                    table_number,
                    waiter: user ? user.name : 'Carlos López',
                    items: summary,
                    total
                });

                const details = summary.map(item => `${item.name} x${item.qty}`).join(', ');
                document.getElementById('confirmMessage').textContent =
                    `Pedido #${order.id} enviado a cocina para la Mesa ${table_number}. Items: ${details}. Total: S/ ${total.toFixed(2)}.`;
                const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
                modal.show();
                currentOrder = [];
                renderOrder();
            } catch (err) {
                alert(err.message);
            }
        });

        loadData();
    </script>
</body>
</html>
