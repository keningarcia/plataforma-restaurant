<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark no-print">
        <div class="container">
            <a class="navbar-brand" href="#">Cuenta</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-light small"><strong id="waiterName"></strong></span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
                <button onclick="api.logout()" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4 no-print">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Cobrar Cuenta</h4>
                    <div>
                        <label for="tableSelect" class="form-label small mb-0 me-2">Mesa:</label>
                        <select id="tableSelect" class="form-select form-select-sm d-inline-block w-auto">
                            <option value="">Seleccionar mesa</option>
                        </select>
                    </div>
                </div>

                <div id="billContainer">
                    <div class="text-center text-muted py-5">
                        <h5>Seleccione una mesa con pedidos listos o servidos</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="printArea" style="display:none"></div>

    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Pago</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Método de pago</label>
                        <select id="paymentMethod" class="form-select">
                            <option value="efectivo">Efectivo</option>
                            <option value="tarjeta">Tarjeta</option>
                            <option value="yape">Yape/Plin</option>
                        </select>
                    </div>
                    <p id="paymentMessage" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="confirmPaymentBtn">Confirmar Pago</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script>
        if (!api.checkAuth()) return;
        const user = api.getUser();
        if (user) document.getElementById('waiterName').textContent = user.name;

        const IGV_RATE = 0.18;
        let currentBillData = null;

        async function populateTables() {
            try {
                const tables = await api.billing.getTablesWithBills();
                const select = document.getElementById('tableSelect');
                select.innerHTML = tables.length === 0
                    ? '<option value="">No hay mesas pendientes de cobro</option>'
                    : '<option value="">Seleccionar mesa</option>' +
                      tables.map(t => `<option value="${t}">Mesa ${t}</option>`).join('');
            } catch {
                document.getElementById('tableSelect').innerHTML = '<option value="">Error al cargar mesas</option>';
            }
        }

        function printBill(table, allItems, subtotal, igv, total) {
            const printWindow = window.open('', '_blank', 'width=400,height=600');
            const itemsRows = allItems.map(i => `
                <tr>
                    <td>${i.name}</td>
                    <td class="text-center">${i.qty}</td>
                    <td class="text-end">S/ ${i.price.toFixed(2)}</td>
                    <td class="text-end">S/ ${(i.price * i.qty).toFixed(2)}</td>
                </tr>
            `).join('');

            printWindow.document.write(`
                <html><head><title>Boleta - Mesa ${table}</title>
                <style>
                    body { font-family: 'Courier New', monospace; padding: 20px; font-size: 14px; }
                    h2 { text-align: center; margin-bottom: 5px; }
                    .header { text-align: center; margin-bottom: 20px; }
                    table { width: 100%; border-collapse: collapse; }
                    td, th { padding: 6px 8px; border-bottom: 1px solid #ddd; }
                    th { text-align: left; font-size: 12px; text-transform: uppercase; }
                    .right { text-align: right; }
                    .center { text-align: center; }
                    .totals { margin-top: 20px; }
                    .totals tr td { border: none; }
                    .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #666; }
                    .line { border-top: 2px dashed #333; margin: 15px 0; }
                </style>
                </head><body>
                    <h2>Plataforma Restaurant</h2>
                    <div class="header">
                        <p>Mesa: ${table} | ${new Date().toLocaleString('es-PE')}</p>
                    </div>
                    <div class="line"></div>
                    <table>
                        <thead>
                            <tr><th>Producto</th><th class="center">Cant.</th><th class="right">P.Unit</th><th class="right">Subtotal</th></tr>
                        </thead>
                        <tbody>
                            ${itemsRows}
                        </tbody>
                    </table>
                    <div class="line"></div>
                    <table class="totals">
                        <tr><td>Subtotal</td><td class="right">S/ ${subtotal.toFixed(2)}</td></tr>
                        <tr><td>IGV (18%)</td><td class="right">S/ ${igv.toFixed(2)}</td></tr>
                        <tr><td><strong>TOTAL</strong></td><td class="right"><strong>S/ ${total.toFixed(2)}</strong></td></tr>
                    </table>
                    <div class="footer">
                        <p>¡Gracias por su visita!</p>
                        <p>Vuelva pronto</p>
                    </div>
                    <script>
                        window.print();
                        setTimeout(() => window.close(), 1000);
                    <\/script>
                </body></html>
            `);
            printWindow.document.close();
        }

        async function renderBill(table) {
            const container = document.getElementById('billContainer');
            if (!table) {
                container.innerHTML = '<div class="text-center text-muted py-5"><h5>Seleccione una mesa con pedidos listos o servidos</h5></div>';
                return;
            }

            try {
                const orders = await api.billing.getTableOrders(table);
                if (orders.length === 0) {
                    container.innerHTML = '<div class="text-center text-muted py-5"><h5>No hay pedidos para esta mesa</h5></div>';
                    return;
                }

                const allItems = [];
                orders.forEach(o => o.items.forEach(i => {
                    const existing = allItems.find(x => x.id === i.id);
                    if (existing) existing.qty += i.qty;
                    else allItems.push({ ...i });
                }));

                const subtotal = allItems.reduce((s, i) => s + i.price * i.qty, 0);
                const igv = subtotal * IGV_RATE;
                const total = subtotal + igv;

                currentBillData = { table, allItems, subtotal, igv, total };

                container.innerHTML = `
                    <div class="card shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between">
                            <h5 class="mb-0">Cuenta - Mesa ${table}</h5>
                            <small class="text-muted">${orders.length} pedido(s)</small>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-striped mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Producto</th>
                                            <th class="text-center">Cant.</th>
                                            <th class="text-end">P. Unit.</th>
                                            <th class="text-end">Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${allItems.map(i => `
                                            <tr>
                                                <td>${i.name}</td>
                                                <td class="text-center">${i.qty}</td>
                                                <td class="text-end">S/ ${i.price.toFixed(2)}</td>
                                                <td class="text-end">S/ ${(i.price * i.qty).toFixed(2)}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                    <tfoot class="table-light">
                                        <tr>
                                            <td colspan="3" class="text-end fw-bold">Subtotal</td>
                                            <td class="text-end">S/ ${subtotal.toFixed(2)}</td>
                                        </tr>
                                        <tr>
                                            <td colspan="3" class="text-end fw-bold">IGV (18%)</td>
                                            <td class="text-end">S/ ${igv.toFixed(2)}</td>
                                        </tr>
                                        <tr class="fw-bold">
                                            <td colspan="3" class="text-end">TOTAL</td>
                                            <td class="text-end fs-5">S/ ${total.toFixed(2)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                        <div class="card-footer bg-white d-flex justify-content-between no-print">
                            <div>
                                <button class="btn btn-outline-danger btn-sm" id="splitBillBtn">Dividir Cuenta</button>
                                <button class="btn btn-outline-info btn-sm" id="printBillBtn">Imprimir Boleta</button>
                            </div>
                            <button class="btn btn-success" id="payBillBtn">Cobrar S/ ${total.toFixed(2)}</button>
                        </div>
                    </div>
                `;

                document.getElementById('payBillBtn').addEventListener('click', function () {
                    document.getElementById('paymentMessage').textContent =
                        `Confirmar cobro de S/ ${total.toFixed(2)} para la Mesa ${table}.`;
                    const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
                    modal.show();
                    document.getElementById('confirmPaymentBtn').onclick = async function () {
                        const payment_method = document.getElementById('paymentMethod').value;
                        try {
                            await api.billing.pay(parseInt(table), payment_method);
                            modal.hide();
                            alert(`Pago exitoso. Método: ${payment_method}`);
                            await populateTables();
                            renderBill();
                        } catch (err) {
                            alert(err.message);
                            modal.hide();
                        }
                    };
                });

                document.getElementById('splitBillBtn').addEventListener('click', function () {
                    const diners = prompt('¿Entre cuántas personas se divide la cuenta?', '2');
                    const n = parseInt(diners);
                    if (isNaN(n) || n < 2) return;
                    const perPerson = total / n;
                    const perPersonIgv = igv / n;
                    alert(`Cuenta dividida en ${n} personas:\n` +
                        `Subtotal c/u: S/ ${(subtotal / n).toFixed(2)}\n` +
                        `IGV c/u: S/ ${perPersonIgv.toFixed(2)}\n` +
                        `Total c/u: S/ ${perPerson.toFixed(2)}`);
                });

                document.getElementById('printBillBtn').addEventListener('click', function () {
                    printBill(table, allItems, subtotal, igv, total);
                });
            } catch {
                container.innerHTML = '<div class="alert alert-danger">Error al cargar la cuenta</div>';
            }
        }

        document.getElementById('tableSelect').addEventListener('change', function () {
            renderBill(this.value);
        });

        populateTables();
    </script>
</body>
</html>
