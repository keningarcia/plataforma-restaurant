<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Gestión de Menú</a>
            <div class="d-flex align-items-center gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0" id="formTitle">Nuevo Plato</h5>
                    </div>
                    <div class="card-body">
                        <form id="menuForm">
                            <input type="hidden" id="editId">
                            <div class="mb-3">
                                <label for="itemName" class="form-label">Nombre del plato</label>
                                <input type="text" class="form-control" id="itemName" required>
                            </div>
                            <div class="mb-3">
                                <label for="itemCategory" class="form-label">Categoría</label>
                                <select class="form-select" id="itemCategory" required>
                                    <option value="entradas">Entradas</option>
                                    <option value="principales">Platos Principales</option>
                                    <option value="bebidas">Bebidas</option>
                                    <option value="postres">Postres</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="itemPrice" class="form-label">Precio (S/)</label>
                                <input type="number" class="form-control" id="itemPrice" step="0.01" min="0" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="itemAvailable" checked>
                                <label class="form-check-label" for="itemAvailable">Disponible</label>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="saveBtn">Guardar Plato</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" id="cancelEditBtn" style="display:none">Cancelar Edición</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <ul class="nav nav-tabs" id="menuTabs">
                    <li class="nav-item">
                        <button class="nav-link active" data-category="entradas">Entradas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="principales">Platos Principales</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="bebidas">Bebidas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="postres">Postres</button>
                    </li>
                </ul>
                <div id="menuItems" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = { menu: 'restaurant_menu' };

        function getMenu() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.menu)) || []; } catch { return []; }
        }

        function saveMenu(menu) {
            localStorage.setItem(STORAGE_KEYS.menu, JSON.stringify(menu));
        }

        let currentCategory = 'entradas';

        function seedDefaultMenu() {
            const menu = getMenu();
            if (menu.length > 0) return;
            const defaults = [
                { id: 1, name: 'Ceviche Clásico', category: 'entradas', price: 28.00, available: true },
                { id: 2, name: 'Papas a la Huancaína', category: 'entradas', price: 18.00, available: true },
                { id: 3, name: 'Tequeños (6 und)', category: 'entradas', price: 15.00, available: true },
                { id: 4, name: 'Ensalada César', category: 'entradas', price: 22.00, available: true },
                { id: 5, name: 'Causa Rellena', category: 'entradas', price: 20.00, available: true },
                { id: 6, name: 'Lomo Saltado', category: 'principales', price: 35.00, available: true },
                { id: 7, name: 'Ají de Gallina', category: 'principales', price: 30.00, available: true },
                { id: 8, name: 'Arroz con Pollo', category: 'principales', price: 28.00, available: true },
                { id: 9, name: 'Parrilla Mixta', category: 'principales', price: 45.00, available: true },
                { id: 10, name: 'Tallarines Verdes', category: 'principales', price: 25.00, available: true },
                { id: 11, name: 'Chicha Morada', category: 'bebidas', price: 8.00, available: true },
                { id: 12, name: 'Inka Kola 500ml', category: 'bebidas', price: 6.00, available: true },
                { id: 13, name: 'Agua Mineral', category: 'bebidas', price: 5.00, available: true },
                { id: 14, name: 'Cerveza Cusqueña', category: 'bebidas', price: 12.00, available: true },
                { id: 15, name: 'Maracuyá Natural', category: 'bebidas', price: 10.00, available: true },
                { id: 16, name: 'Suspiro Limeño', category: 'postres', price: 14.00, available: true },
                { id: 17, name: 'Picarones (4 und)', category: 'postres', price: 12.00, available: true },
                { id: 18, name: 'Tarta de Chocolate', category: 'postres', price: 16.00, available: true },
                { id: 19, name: 'Mazamorra Morada', category: 'postres', price: 10.00, available: true },
                { id: 20, name: 'Helado Artesanal', category: 'postres', price: 11.00, available: true }
            ];
            saveMenu(defaults);
        }

        function getNextId() {
            const menu = getMenu();
            return menu.length > 0 ? Math.max(...menu.map(i => i.id)) + 1 : 1;
        }

        function renderMenu() {
            const menu = getMenu().filter(i => i.category === currentCategory);
            const container = document.getElementById('menuItems');
            container.innerHTML = menu.length === 0
                ? '<p class="text-muted">No hay platos en esta categoría.</p>'
                : `<div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Disponible</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${menu.map(i => `
                                <tr class="${i.available ? '' : 'table-secondary text-muted'}">
                                    <td>${i.name}</td>
                                    <td>S/ ${i.price.toFixed(2)}</td>
                                    <td>${i.available ? '<span class="badge bg-success">Sí</span>' : '<span class="badge bg-danger">No</span>'}</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-primary edit-item" data-id="${i.id}">Editar</button>
                                        <button class="btn btn-sm btn-outline-danger delete-item" data-id="${i.id}">Eliminar</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        document.querySelectorAll('#menuTabs .nav-link').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('#menuTabs .nav-link').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMenu();
            });
        });

        document.getElementById('menuForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const name = document.getElementById('itemName').value.trim();
            const category = document.getElementById('itemCategory').value;
            const price = parseFloat(document.getElementById('itemPrice').value);
            const available = document.getElementById('itemAvailable').checked;

            let menu = getMenu();
            if (editId) {
                const idx = menu.findIndex(i => i.id === parseInt(editId));
                if (idx !== -1) { menu[idx] = { ...menu[idx], name, category, price, available }; }
                document.getElementById('formTitle').textContent = 'Nuevo Plato';
                document.getElementById('saveBtn').textContent = 'Guardar Plato';
                document.getElementById('cancelEditBtn').style.display = 'none';
                document.getElementById('editId').value = '';
            } else {
                menu.push({ id: getNextId(), name, category, price, available });
            }
            saveMenu(menu);
            this.reset();
            document.getElementById('itemAvailable').checked = true;
            renderMenu();
        });

        document.getElementById('cancelEditBtn').addEventListener('click', function () {
            document.getElementById('formTitle').textContent = 'Nuevo Plato';
            document.getElementById('saveBtn').textContent = 'Guardar Plato';
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('menuForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('itemAvailable').checked = true;
        });

        document.getElementById('menuItems').addEventListener('click', function (e) {
            const menu = getMenu();

            const editBtn = e.target.closest('.edit-item');
            if (editBtn) {
                const id = parseInt(editBtn.dataset.id);
                const item = menu.find(i => i.id === id);
                if (item) {
                    document.getElementById('editId').value = item.id;
                    document.getElementById('itemName').value = item.name;
                    document.getElementById('itemCategory').value = item.category;
                    document.getElementById('itemPrice').value = item.price;
                    document.getElementById('itemAvailable').checked = item.available;
                    document.getElementById('formTitle').textContent = 'Editar Plato';
                    document.getElementById('saveBtn').textContent = 'Actualizar Plato';
                    document.getElementById('cancelEditBtn').style.display = 'block';
                }
                return;
            }

            const deleteBtn = e.target.closest('.delete-item');
            if (deleteBtn) {
                const id = parseInt(deleteBtn.dataset.id);
                if (confirm('¿Eliminar este plato del menú?')) {
                    saveMenu(menu.filter(i => i.id !== id));
                    renderMenu();
                }
            }
        });

        seedDefaultMenu();
        renderMenu();
    </script>
</body>
</html>
