<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Gestión - Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Plataforma Restaurant</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-light small">Mesero: <strong>Carlos López</strong></span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Menú</h4>
                    <div>
                        <label for="tableSelect" class="form-label small mb-0 me-2">Mesa:</label>
                        <select id="tableSelect" class="form-select form-select-sm d-inline-block w-auto"></select>
                    </div>
                </div>

                <ul class="nav nav-tabs" id="menuTabs">
                    <li class="nav-item">
                        <button class="nav-link active" data-category="entradas">Entradas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="principales">Platos Principales</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="bebidas">Bebidas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-category="postres">Postres</button>
                    </li>
                </ul>

                <div id="menuItems" class="row mt-3"></div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Pedido Actual</h5>
                    </div>
                    <div class="card-body p-3">
                        <div id="orderItems">
                            <p class="text-muted text-center small mb-0">No hay items en el pedido.</p>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <div class="d-flex justify-content-between mb-2">
                            <strong>Total:</strong>
                            <strong id="orderTotal">S/ 0.00</strong>
                        </div>
                        <div class="d-grid gap-2">
                            <button id="sendOrderBtn" class="btn btn-success" disabled>Enviar a Cocina</button>
                            <button id="clearOrderBtn" class="btn btn-outline-danger btn-sm">Cancelar Pedido</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Pedido Enviado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage" class="mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const STORAGE_KEYS = { menu: 'restaurant_menu', tables: 'restaurant_tables', orders: 'restaurant_orders' };

        function getData(key) {
            try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
        }

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function seedDefaults() {
            if (getData(STORAGE_KEYS.menu).length === 0) {
                const defaults = [
                    { id: 1, name: 'Ceviche Clásico', category: 'entradas', price: 28.00, available: true },
                    { id: 2, name: 'Papas a la Huancaína', category: 'entradas', price: 18.00, available: true },
                    { id: 3, name: 'Tequeños (6 und)', category: 'entradas', price: 15.00, available: true },
                    { id: 4, name: 'Ensalada César', category: 'entradas', price: 22.00, available: true },
                    { id: 5, name: 'Causa Rellena', category: 'entradas', price: 20.00, available: true },
                    { id: 6, name: 'Lomo Saltado', category: 'principales', price: 35.00, available: true },
                    { id: 7, name: 'Ají de Gallina', category: 'principales', price: 30.00, available: true },
                    { id: 8, name: 'Arroz con Pollo', category: 'principales', price: 28.00, available: true },
                    { id: 9, name: 'Parrilla Mixta', category: 'principales', price: 45.00, available: true },
                    { id: 10, name: 'Tallarines Verdes', category: 'principales', price: 25.00, available: true },
                    { id: 11, name: 'Chicha Morada', category: 'bebidas', price: 8.00, available: true },
                    { id: 12, name: 'Inka Kola 500ml', category: 'bebidas', price: 6.00, available: true },
                    { id: 13, name: 'Agua Mineral', category: 'bebidas', price: 5.00, available: true },
                    { id: 14, name: 'Cerveza Cusqueña', category: 'bebidas', price: 12.00, available: true },
                    { id: 15, name: 'Maracuyá Natural', category: 'bebidas', price: 10.00, available: true },
                    { id: 16, name: 'Suspiro Limeño', category: 'postres', price: 14.00, available: true },
                    { id: 17, name: 'Picarones (4 und)', category: 'postres', price: 12.00, available: true },
                    { id: 18, name: 'Tarta de Chocolate', category: 'postres', price: 16.00, available: true },
                    { id: 19, name: 'Mazamorra Morada', category: 'postres', price: 10.00, available: true },
                    { id: 20, name: 'Helado Artesanal', category: 'postres', price: 11.00, available: true }
                ];
                saveData(STORAGE_KEYS.menu, defaults);
            }
            if (getData(STORAGE_KEYS.tables).length === 0) {
                const defaults = [
                    { id: 1, number: 1, capacity: 4 }, { id: 2, number: 2, capacity: 4 },
                    { id: 3, number: 3, capacity: 2 }, { id: 4, number: 4, capacity: 6 },
                    { id: 5, number: 5, capacity: 4 }, { id: 6, number: 6, capacity: 2 },
                    { id: 7, number: 7, capacity: 8 }, { id: 8, number: 8, capacity: 4 }
                ];
                saveData(STORAGE_KEYS.tables, defaults);
            }
        }

        function getNextOrderId() {
            const orders = getData(STORAGE_KEYS.orders);
            return orders.length > 0 ? Math.max(...orders.map(o => o.id)) + 1 : 1;
        }

        function loadTables() {
            const tables = getData(STORAGE_KEYS.tables);
            const select = document.getElementById('tableSelect');
            select.innerHTML = tables.map(t => `<option value="${t.number}">Mesa ${t.number}</option>`).join('');
        }

        let currentOrder = [];
        let currentCategory = 'entradas';

        const menuItemsEl = document.getElementById('menuItems');
        const orderItemsEl = document.getElementById('orderItems');
        const orderTotalEl = document.getElementById('orderTotal');
        const sendOrderBtn = document.getElementById('sendOrderBtn');
        const clearOrderBtn = document.getElementById('clearOrderBtn');

        function renderMenu(category) {
            const allMenu = getData(STORAGE_KEYS.menu).filter(i => i.available !== false);
            const items = allMenu.filter(i => i.category === category);
            menuItemsEl.innerHTML = items.length === 0
                ? '<p class="text-muted">No hay platos disponibles en esta categoría.</p>'
                : items.map(item => `
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">${item.name}</h6>
                                    <small class="text-muted">S/ ${item.price.toFixed(2)}</small>
                                </div>
                                <button class="btn btn-sm btn-outline-primary add-item" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        function getOrderSummary() {
            const summary = {};
            currentOrder.forEach(item => {
                if (!summary[item.id]) {
                    summary[item.id] = { id: item.id, name: item.name, price: item.price, qty: 0 };
                }
                summary[item.id].qty++;
            });
            return Object.values(summary);
        }

        function renderOrder() {
            if (currentOrder.length === 0) {
                orderItemsEl.innerHTML = '<p class="text-muted text-center small mb-0">No hay items en el pedido.</p>';
                orderTotalEl.textContent = 'S/ 0.00';
                sendOrderBtn.disabled = true;
                return;
            }

            const summary = getOrderSummary();
            let total = 0;
            orderItemsEl.innerHTML = summary.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                return `
                    <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                        <div>
                            <small class="d-block fw-bold">${item.name}</small>
                            <small class="text-muted">${item.qty} x S/ ${item.price.toFixed(2)}</small>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="fw-bold">S/ ${subtotal.toFixed(2)}</span>
                            <button class="btn btn-sm btn-outline-danger remove-item" data-id="${item.id}">&times;</button>
                        </div>
                    </div>
                `;
            }).join('');

            orderTotalEl.textContent = `S/ ${total.toFixed(2)}`;
            sendOrderBtn.disabled = false;
        }

        document.querySelectorAll('#menuTabs .nav-link').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('#menuTabs .nav-link').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMenu(currentCategory);
            });
        });

        menuItemsEl.addEventListener('click', function (e) {
            const btn = e.target.closest('.add-item');
            if (!btn) return;
            const id = parseInt(btn.dataset.id);
            const name = btn.dataset.name;
            const price = parseFloat(btn.dataset.price);
            currentOrder.push({ id, name, price });
            renderOrder();
        });

        orderItemsEl.addEventListener('click', function (e) {
            const btn = e.target.closest('.remove-item');
            if (!btn) return;
            const id = parseInt(btn.dataset.id);
            const idx = currentOrder.findLastIndex(item => item.id === id);
            if (idx !== -1) {
                currentOrder.splice(idx, 1);
                renderOrder();
            }
        });

        clearOrderBtn.addEventListener('click', function () {
            if (currentOrder.length === 0) return;
            if (confirm('¿Estás seguro de cancelar el pedido actual?')) {
                currentOrder = [];
                renderOrder();
            }
        });

        sendOrderBtn.addEventListener('click', function () {
            const table = parseInt(document.getElementById('tableSelect').value);
            const summary = getOrderSummary();
            const total = summary.reduce((sum, item) => sum + item.price * item.qty, 0);
            const details = summary.map(item => `${item.name} x${item.qty}`).join(', ');

            const order = {
                id: getNextOrderId(),
                table,
                waiter: 'Carlos López',
                items: summary,
                total,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            const orders = getData(STORAGE_KEYS.orders);
            orders.push(order);
            saveData(STORAGE_KEYS.orders, orders);

            document.getElementById('confirmMessage').textContent =
                `Pedido #${order.id} enviado a cocina para la Mesa ${table}. Items: ${details}. Total: S/ ${total.toFixed(2)}.`;
            const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
            modal.show();
            currentOrder = [];
            renderOrder();
        });

        seedDefaults();
        loadTables();
        renderMenu(currentCategory);
    </script>
</body>
</html>
