<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Historial de Pedidos</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-light small"><strong id="waiterName"></strong></span>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
                <button onclick="api.logout()" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-2">
                        <label class="form-label small">Fecha inicio</label>
                        <input type="date" id="filterFrom" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Fecha fin</label>
                        <input type="date" id="filterTo" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Mesa</label>
                        <select id="filterTable" class="form-select form-select-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Mesero</label>
                        <select id="filterWaiter" class="form-select form-select-sm">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Pago</label>
                        <select id="filterPayment" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="efectivo">Efectivo</option>
                            <option value="tarjeta">Tarjeta</option>
                            <option value="yape">Yape/Plin</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button id="applyFilterBtn" class="btn btn-primary btn-sm">Filtrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="historyContainer">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Cargando historial...</p>
            </div>
        </div>

        <nav id="paginationNav" aria-label="Paginación" class="d-none">
            <ul class="pagination justify-content-center">
                <li class="page-item" id="prevPage"><a class="page-link" href="#">Anterior</a></li>
                <li class="page-item disabled"><a class="page-link" href="#" id="pageInfo">Página 1</a></li>
                <li class="page-item" id="nextPage"><a class="page-link" href="#">Siguiente</a></li>
            </ul>
        </nav>
    </div>

    <script src="api.js"></script>
    <script>
        if (!api.checkAuth()) return;
        const user = api.getUser();
        if (user) document.getElementById('waiterName').textContent = user.name;

        let currentPage = 1;
        let totalPages = 1;

        async function populateFilters() {
            try {
                const filters = await api.billing.getHistoryFilters();
                const tableSelect = document.getElementById('filterTable');
                tableSelect.innerHTML = '<option value="">Todas</option>' +
                    filters.tables.map(t => `<option value="${t}">Mesa ${t}</option>`).join('');

                const waiterSelect = document.getElementById('filterWaiter');
                waiterSelect.innerHTML = '<option value="">Todos</option>' +
                    filters.waiters.map(w => `<option value="${w}">${w}</option>`).join('');
            } catch {}
        }

        async function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div><p class="text-muted mt-2">Cargando...</p></div>';

            try {
                const params = {
                    from: document.getElementById('filterFrom').value,
                    to: document.getElementById('filterTo').value,
                    table: document.getElementById('filterTable').value,
                    waiter: document.getElementById('filterWaiter').value,
                    payment_method: document.getElementById('filterPayment').value,
                    page: currentPage,
                    limit: 20
                };
                Object.keys(params).forEach(k => { if (!params[k]) delete params[k]; });

                const result = await api.billing.getHistory(params);
                const history = result.data;
                const pagination = result.pagination;

                if (history.length === 0) {
                    container.innerHTML = '<p class="text-muted text-center">No se encontraron pedidos en el historial.</p>';
                    document.getElementById('paginationNav').classList.add('d-none');
                    return;
                }

                totalPages = pagination.totalPages;
                document.getElementById('pageInfo').textContent = `Página ${pagination.page} de ${totalPages} (${pagination.total} registros)`;
                document.getElementById('prevPage').classList.toggle('disabled', currentPage <= 1);
                document.getElementById('nextPage').classList.toggle('disabled', currentPage >= totalPages);
                document.getElementById('paginationNav').classList.remove('d-none');

                container.innerHTML = history.map(o => {
                    const total = o.items.reduce((s, i) => s + i.price * i.qty, 0);
                    const date = o.created_at ? new Date(o.created_at).toLocaleString('es-PE') : '—';
                    const methodLabels = { efectivo: 'Efectivo', tarjeta: 'Tarjeta', yape: 'Yape/Plin' };
                    const methodLabel = methodLabels[o.payment_method] || o.payment_method || '—';
                    return `
                        <div class="card shadow-sm mb-2">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>Mesa ${o.table_number}</strong>
                                    <span class="badge bg-secondary ms-2">${date}</span>
                                    <span class="badge bg-info ms-1">${methodLabel}</span>
                                </div>
                                <div>
                                    <span class="text-muted small me-2">${o.waiter || '—'}</span>
                                    <strong>S/ ${total.toFixed(2)}</strong>
                                </div>
                            </div>
                            <div class="card-body py-2">
                                <div class="table-responsive">
                                    <table class="table table-sm mb-0">
                                        <thead>
                                            <tr>
                                                <th>Producto</th>
                                                <th class="text-center">Cant.</th>
                                                <th class="text-end">Precio</th>
                                                <th class="text-end">Subtotal</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${o.items.map(i => `
                                                <tr>
                                                    <td>${i.name}</td>
                                                    <td class="text-center">${i.qty}</td>
                                                    <td class="text-end">S/ ${i.price.toFixed(2)}</td>
                                                    <td class="text-end">S/ ${(i.price * i.qty).toFixed(2)}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch {
                container.innerHTML = '<div class="alert alert-danger">Error al cargar el historial</div>';
            }
        }

        document.getElementById('applyFilterBtn').addEventListener('click', function () {
            currentPage = 1;
            renderHistory();
        });

        document.getElementById('prevPage').addEventListener('click', function (e) {
            e.preventDefault();
            if (currentPage > 1) { currentPage--; renderHistory(); }
        });

        document.getElementById('nextPage').addEventListener('click', function (e) {
            e.preventDefault();
            if (currentPage < totalPages) { currentPage++; renderHistory(); }
        });

        populateFilters();
        renderHistory();
    </script>
</body>
</html>
