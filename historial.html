<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Historial de Pedidos</a>
            <div class="d-flex align-items-center gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small">Fecha inicio</label>
                        <input type="date" id="filterFrom" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Fecha fin</label>
                        <input type="date" id="filterTo" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Mesa</label>
                        <select id="filterTable" class="form-select form-select-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Mesero</label>
                        <select id="filterWaiter" class="form-select form-select-sm">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button id="applyFilterBtn" class="btn btn-primary btn-sm">Filtrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="historyContainer">
            <p class="text-muted text-center">Cargando historial...</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        if (!api.getToken()) { window.location.href = 'index.html'; }

        async function populateFilters() {
            try {
                const filters = await api.billing.getHistoryFilters();
                const tableSelect = document.getElementById('filterTable');
                tableSelect.innerHTML = '<option value="">Todas</option>' +
                    filters.tables.map(t => `<option value="${t}">Mesa ${t}</option>`).join('');

                const waiterSelect = document.getElementById('filterWaiter');
                waiterSelect.innerHTML = '<option value="">Todos</option>' +
                    filters.waiters.map(w => `<option value="${w}">${w}</option>`).join('');
            } catch {}
        }

        async function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<p class="text-muted text-center">Cargando...</p>';

            try {
                const params = {
                    from: document.getElementById('filterFrom').value,
                    to: document.getElementById('filterTo').value,
                    table: document.getElementById('filterTable').value,
                    waiter: document.getElementById('filterWaiter').value
                };
                Object.keys(params).forEach(k => { if (!params[k]) delete params[k]; });

                const history = await api.billing.getHistory(params);

                if (history.length === 0) {
                    container.innerHTML = '<p class="text-muted text-center">No se encontraron pedidos en el historial.</p>';
                    return;
                }

                container.innerHTML = history.map(o => {
                    const total = o.items.reduce((s, i) => s + i.price * i.qty, 0);
                    const date = o.created_at ? new Date(o.created_at).toLocaleString('es-PE') : '—';
                    return `
                        <div class="card shadow-sm mb-2">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>Mesa ${o.table_number}</strong>
                                    <span class="badge bg-secondary ms-2">${date}</span>
                                </div>
                                <div>
                                    <span class="text-muted small me-2">${o.waiter || '—'}</span>
                                    <strong>S/ ${total.toFixed(2)}</strong>
                                </div>
                            </div>
                            <div class="card-body py-2">
                                <div class="table-responsive">
                                    <table class="table table-sm mb-0">
                                        <thead>
                                            <tr>
                                                <th>Producto</th>
                                                <th class="text-center">Cant.</th>
                                                <th class="text-end">Precio</th>
                                                <th class="text-end">Subtotal</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${o.items.map(i => `
                                                <tr>
                                                    <td>${i.name}</td>
                                                    <td class="text-center">${i.qty}</td>
                                                    <td class="text-end">S/ ${i.price.toFixed(2)}</td>
                                                    <td class="text-end">S/ ${(i.price * i.qty).toFixed(2)}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch {
                container.innerHTML = '<div class="alert alert-danger">Error al cargar el historial</div>';
            }
        }

        document.getElementById('applyFilterBtn').addEventListener('click', renderHistory);

        populateFilters();
        renderHistory();
    </script>
</body>
</html>
