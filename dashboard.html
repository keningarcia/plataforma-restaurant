<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Plataforma Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Plataforma Restaurant</a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-light small">Bienvenido, <strong id="waiterName">Admin</strong></span>
                <button onclick="api.logout()" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-3 mb-4" id="statsRow"><div class="col-12 text-center py-4"><div class="spinner-border text-primary" role="status"></div></div></div>
        <div class="row g-3">
            <div class="col-md-4 col-lg-3">
                <a href="pedidos.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F377;</h1>
                        <h5 class="card-title">Pedidos</h5>
                        <p class="card-text text-muted small">Tomar pedido por mesa</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3">
                <a href="cocina.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F373;</h1>
                        <h5 class="card-title">Cocina</h5>
                        <p class="card-text text-muted small">Ver pedidos entrantes</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3">
                <a href="cuenta.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F4B0;</h1>
                        <h5 class="card-title">Cuenta</h5>
                        <p class="card-text text-muted small">Cobrar por mesa</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3">
                <a href="menu.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F372;</h1>
                        <h5 class="card-title">Menú</h5>
                        <p class="card-text text-muted small">Administrar platos</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3">
                <a href="mesas.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F4CA;</h1>
                        <h5 class="card-title">Mesas</h5>
                        <p class="card-text text-muted small">Gestionar mesas</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3">
                <a href="usuarios.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F465;</h1>
                        <h5 class="card-title">Usuarios</h5>
                        <p class="card-text text-muted small">Gestionar usuarios</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3">
                <a href="historial.html" class="card text-decoration-none h-100 shadow-sm">
                    <div class="card-body text-center py-4">
                        <h1 class="mb-2">&#x1F4C4;</h1>
                        <h5 class="card-title">Historial</h5>
                        <p class="card-text text-muted small">Pedidos anteriores</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        if (!api.checkAuth()) return;

        const user = api.getUser();
        document.getElementById('waiterName').textContent = user ? user.name : 'Admin';

        async function updateStats() {
            try {
                const stats = await api.orders.getStats();
                document.getElementById('statsRow').innerHTML = `
                    <div class="col-md-3">
                        <div class="card bg-primary text-white shadow-sm">
                            <div class="card-body">
                                <h6 class="card-title mb-0">Pedidos Pendientes</h6>
                                <h2 class="mb-0">${stats.pending}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-dark shadow-sm">
                            <div class="card-body">
                                <h6 class="card-title mb-0">En Preparación</h6>
                                <h2 class="mb-0">${stats.preparing}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success text-white shadow-sm">
                            <div class="card-body">
                                <h6 class="card-title mb-0">Listos para Servir</h6>
                                <h2 class="mb-0">${stats.ready}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white shadow-sm">
                            <div class="card-body">
                                <h6 class="card-title mb-0">Mesas Ocupadas</h6>
                                <h2 class="mb-0">${stats.activeTables}</h2>
                            </div>
                        </div>
                    </div>
                `;
            } catch {
                document.getElementById('statsRow').innerHTML = '<div class="col-12"><div class="alert alert-danger">Error al cargar estadísticas</div></div>';
            }
        }

        updateStats();
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
